   .main{
    display: flex;
    justify-content: space-between;
   }

   .p1,.p2{
    width: 500px;
    display: flex;
    flex-wrap:wrap;
   }
   #button{
    height: 80px;
    width:99px;
    margin-top:50px;
    font-size: 40px;
    font-weight: bold;
    color:yellow;
    background-color: black;
    cursor:pointer;
    border-radius: 10px;
   }


   img{
    cursor: pointer;
    margin-right:4px;
    width:120px;
    height:170px;
   }

@keyframes aaa{
    from { transform: rotate(-5deg); }
    to   { transform: rotate(5deg); }
}



   .p2 img{
    opacity: 0;
   }
   .p2{
        background-color: black;
   }


   .position{
    position: absolute;
    top:calc(55% - 60px);
    left: calc(50% - 45px)
    
   }
