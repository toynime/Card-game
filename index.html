<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body{
            background-color: brown;
        }
   .main{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

   .p1,.p2{
    width: 500px;
    display: flex;
    flex-wrap:wrap;
   }
   #button{
    height: 80px;
    width:99px;
    margin-top:50px;
    font-size: 40px;
    font-weight: bold;
    color:yellow;
    background-color: black;
    cursor:pointer;
    border-radius: 10px;
   }


   img{
    cursor: pointer;
    margin-right:4px;
    width:120px;
    height:170px;
   }

@keyframes aaa{
    from { transform: rotate(-5deg); }
    to   { transform: rotate(5deg); }
}


   .position{
    position: absolute;
    top:calc(55% - 60px);
    left: calc(50% - 45px)
    
   }

   #overlay {
    position: fixed;
    inset: 0;
    display: none;

    justify-content: center;
    align-items: center;

    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);

    z-index: 9999;
}

#popup {
    background: black;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    width: 520px;
    height: 340px;
}
#popup img{
    transition: all 0.5s;
}
#popup img:hover{
    margin-bottom: 65px;
}

#mess1,#mess2{
    align-self: center;
    transition: all 2s;
    color: white;
    font-size: 25px;
}
   </style>
</head>
<body>
<div class="main">
    <div class="p1"></div>

     <input type="button" value="+" id="button">

    }
    if(event.target.alt[0]!=weapen && event.target.alt.match(/\d+$/)[0]!=curent.alt.match(/\d+$/)[0] && !event.target.alt.endsWith("11")){

        void event.target.offsetWidth;
        event.target.style.animation = "aaa 0.1s ease 10";
    }
